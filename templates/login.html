{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="form-box small-box">
        <h2>Login</h2>
        <p class="muted">Use the demo accounts below.</p>

        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>

            <button class="btn auth-btn" type="submit">Login</button>
        </form>

        <hr>

        <p><strong>Admin:</strong> admin@noticeiq.com / admin123</p>
        <p><strong>Student:</strong> student@noticeiq.com / student123</p>
    </div>
</div>
{% endblock %}
